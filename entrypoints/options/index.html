<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Voice to Text — Settings</title>
  </head>
  <body>
    <main class="page">
      <header class="page__header">
        <div class="brand">
          <span class="brand__icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M12 15a3.5 3.5 0 0 0 3.5-3.5v-5a3.5 3.5 0 1 0-7 0v5A3.5 3.5 0 0 0 12 15z"/><path d="M18.5 11.5a.9.9 0 0 0-1.8 0 4.7 4.7 0 0 1-9.4 0 .9.9 0 0 0-1.8 0 6.5 6.5 0 0 0 5.6 6.44V20H8.8a.9.9 0 0 0 0 1.8h6.4a.9.9 0 0 0 0-1.8h-2.3v-2.06a6.5 6.5 0 0 0 5.6-6.44z"/></svg>
          </span>
          <h1 data-i18n="set.title">Settings</h1>
        </div>
        <p class="page__sub" data-i18n="set.autosave">Changes are saved automatically.</p>
      </header>

      <section class="card">
        <div id="settings-container"></div>
      </section>

      <section class="card">
        <h2 data-i18n="set.micSection">Microphone</h2>
        <p class="set-hint" data-i18n="set.micHint"></p>
        <button type="button" id="open-onboarding" class="btn" data-i18n="set.micBtn">Open microphone setup</button>
      </section>

      <p class="saved-toast" id="saved-toast" role="status" aria-live="polite" hidden data-i18n="set.savedToast">Saved ✓</p>
    </main>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
